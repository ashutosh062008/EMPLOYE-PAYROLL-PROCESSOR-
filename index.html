<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payroll Dashboard - Employee Payroll Processor</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Sidebar Navigation -->
    <nav class="sidebar">
        <a href="index.html" class="logo">
            <div class="logo-icon">₹</div>
            <span>PayrollPro</span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html" class="nav-item active"><span>📊 Dashboard</span></a></li>
            <li><a href="about.html" class="nav-item"><span>ℹ️ About System</span></a></li>
            <li><a href="settings.html" class="nav-item"><span>⚙️ Settings</span></a></li>
        </ul>
    </nav>

    <!-- Main Content Layout -->
    <div class="main-layout">
        <div class="container">
            <header>
                <h1>Payroll Dashboard</h1>
                <p>Manage employee salaries and records with permanent data persistence.</p>
            </header>

            <main class="payroll-dashboard">
                <!-- Input Form Section -->
                <section class="card input-section">
                    <h2>Add Employee</h2>
                    <form id="employeeForm">
                        <div class="form-group">
                            <label for="empName">Employee Name</label>
                            <input type="text" id="empName" placeholder="Enter full name" required>
                        </div>

                        <div class="form-group">
                            <label for="empType">Employee Type</label>
                            <select id="empType" required>
                                <option value="" disabled selected>Select an employee type</option>
                                <option value="fulltime">Full-Time Employee</option>
                                <option value="contract">Contract Employee</option>
                                <option value="hourly">Hourly Employee</option>
                            </select>
                        </div>

                        <!-- Dynamic Input Fields based on Employee Type -->
                        <div id="dynamicInputs" class="dynamic-inputs">
                            <!-- Injected via script.js -->
                        </div>

                        <button type="submit" class="primary-btn">Generate Payroll</button>
                    </form>
                </section>

                <!-- Results Section -->
                <section class="results-section">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                        <h2>Recent Records</h2>
                        <div class="btn-group">
                            <button id="exportCsv" class="primary-btn secondary-btn"
                                style="width: auto; padding: 0.6rem 1rem; margin-top: 0; font-size: 0.85rem;">📥 Export
                                CSV</button>
                            <button id="clearAll" class="primary-btn secondary-btn"
                                style="width: auto; padding: 0.6rem 1rem; margin-top: 0; font-size: 0.85rem; border-color: rgba(239, 68, 68, 0.3); color: var(--danger-color);">🗑️
                                Clear All</button>
                        </div>
                    </div>

                    <div id="payrollList" class="payroll-list">
                        <div class="empty-state">
                            <p>No payroll generated yet. Add an employee to begin.</p>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
